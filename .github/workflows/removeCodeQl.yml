name: remove codeQl keys for add-ons metadata

on:
  workflow_dispatch:
jobs:
  removeCodeQl:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Remove codeQl keys from add-ons metadata
      shell: bash
      run: |
        ./remove-codeql-keys.sh
        git add addons
        if git diff --cached --quiet; then
        exit 1
        fi
    - name: Upload addons folder as an artifact
      uses: actions/upload-artifact@v7
      with:
        name: addons
        path: addons

  createPullRequest:
    runs-on: ubuntu-latest
    needs: removeCodeQl
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Download addons folder artifact
      uses: actions/download-artifact@v8
      with:
        name: addons
    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add addons
        git commit -m "Remove codeQl keys from add-ons metadata"
        gh pr create --title "Remove codeQl keys from add-ons metadata" --body "This PR removes codeQl keys from add-ons metadata." --base master --head ${{ github.actor }}:remove-codeql-keys 
        