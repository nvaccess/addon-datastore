name: Send json file

on:
  issues:
    types:
      - labeled

env:
  jobFooter: "\n\n---\n\n[Related GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

jobs:
  check-addon:
    permissions:
      contents: write
      issues: write
    name: Check add-on
    if: github.event.label.name == 'autoSubmissionFromIssue'
    runs-on: ubuntu-latest
    env:
        VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - name: Get data
      id: get-data
      uses: actions/github-script@v9
      with:
        script: |
          const setOutputFromIssue = require('./.github/workflows/getData.js')
          setOutputFromIssue({context, core})
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Create validation errors file
      run: echo "" > validationErrors.md
    - name: Create JSON submission from issue
      env:
        # transfer user input to env variables to escape any code
        # https://blog.gitguardian.com/github-actions-security-cheat-sheet/
        channel: ${{ steps.get-data.outputs.releaseChannel }}
        publisher: ${{ steps.get-data.outputs.publisher }}
        sourceUrl: ${{ steps.get-data.outputs.sourceUrl }}
        url: ${{ steps.get-data.outputs.downloadUrl }}
        licName: ${{ steps.get-data.outputs.licenseName }}
        licUrl: ${{ steps.get-data.outputs.licenseURL }}
      run: |
        uv run --directory validation python -m _validate.createJson \
          -f "$GITHUB_WORKSPACE/addon.nvda-addon" \
          --dir "$GITHUB_WORKSPACE/addons" \
          --output "$GITHUB_WORKSPACE/validationErrors.md" \
          --channel "$channel" \
          --publisher "$publisher" \
          --sourceUrl "$sourceUrl" \
          --url "$url" \
          --licName "$licName" \
          --licUrl "$licUrl"
    - name: Post validation errors as comment
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "${{ env.jobFooter }}" >> validationErrors.md
        gh issue comment "${{ github.event.issue.number }}" --body-file validationErrors.md
        gh issue close "${{ github.event.issue.number }}"
    - name: Delete branch if it exists already
      continue-on-error: true
      env:
        branchName: ${{ github.event.issue.user.login }}${{ steps.get-data.outputs.issueNumber }}
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git push origin --delete ${{ env.branchName }}
    - name: Create branch
      id: cb
      env:
        branchName: ${{ github.event.issue.user.login }}${{ steps.get-data.outputs.issueNumber }}
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git checkout -b ${{ env.branchName }}
        git add addons
        git commit -m "Submit add-on"
        git push origin ${{ env.branchName }}
    - name: Install VirusTotal
      if: env.VT_API_KEY != ''
      run: |
        curl -fsSL -o vt-cli.zip https://github.com/VirusTotal/vt-cli/releases/latest/download/Linux64.zip
        unzip -q vt-cli.zip
        chmod +x vt
        sudo mv vt /usr/local/bin/vt
    - name: Scan add-on with VirusTotal
      if: env.VT_API_KEY != ''
      run: vt scan file -k "$VT_API_KEY" addon.nvda-addon
  call-workflow:
    needs: check-addon
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
      discussions: write
      security-events: write
    uses: ./.github/workflows/checkAndSubmitAddonMetadata.yml
    with:
      issueNumber: "${{ github.event.issue.number }}"
      issueAuthorId: ${{ github.event.issue.user.id }}
      issueAuthorName: ${{ github.event.issue.user.login }}
    secrets:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      VIEWS_PUSH_TOKEN: ${{ secrets.VIEWS_PUSH_TOKEN }}
