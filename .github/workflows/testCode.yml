name: Test validation and transform code

on:
  push:
    branches: [ master ]
    paths-ignore:
      - addons/**
      - discussions.json
      - submitters.json
  pull_request:
    branches: [ master ]
    paths-ignore:
      - addons/**
      - discussions.json
      - submitters.json

jobs:
  pyrightValidation:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Run pyright for validation
      run: uv run --group lint --directory validation pyright --threads --level warning
    - name: Run pyright for transform
      run: uv run --group lint --directory transform pyright --threads --level warning
  testValidationCode:
    permissions:
      contents: read
    defaults:
      run:
        working-directory: validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Validate metadata
      # E2E: test to check the script can be run, no need to actually test the file.
      # The internal checks are covered with unit tests.
      run: |
        uv run --directory validation python -m _validate.validate ^
        --dry-run ^
        tests/testData/addons/fake/13.0.0.json ^
        tests/testData/nvdaAPIVersions.json
    - name: Generate json file
      # E2E: test to check the script can be run
      run: |
        uv run --directory validation python -m _validate.createJson ^
        --dry-run ^
        -f tests/testData/fake.nvda-addon ^
        --dir tests/testOutput/test_runcreatejson ^
        --channel=stable ^
        --publisher=fakepublisher ^
        --sourceUrl=https://github.com/fake/ ^
        --url=https://github.com/fake.nvda-addon ^
        --licName="GPL v2" ^
        --licUrl="https://www.gnu.org/licenses/gpl-2.0.html"
