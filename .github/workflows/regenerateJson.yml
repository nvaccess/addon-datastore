name: Regenerate json files for all add-ons

on:
  workflow_dispatch:

jobs:
  regenerateJson:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Create validation errors file
      run: echo "" > validationErrors.md
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Regenerate json
      run: |
        uv run --directory validation python -m _validate.regenerateJson \
          --dir ../addons \
          --output validationErrors.md
    - name: Commit changes and open PR
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        baseBranch="${{ github.ref_name }}"
        headBranch="regenJson${{ github.run_id }}-${{ github.run_attempt }}"

        git add addons
        if git diff --staged --quiet; then
          echo "No changes to commit; skipping PR creation."
        else
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "$headBranch"
          git commit -m "[Automated] Regenerate json files"
          git push --set-upstream origin "$headBranch"

          prUrl=$(gh pr create \
            --base "$baseBranch" \
            --head "$headBranch" \
            --title "[Automated] Regenerate json files" \
            --body "Regenerated json files for add-ons. Triggered from workflow run ${{ github.run_id }}.")

          gh pr merge "$prUrl" --squash --delete-branch
        fi
    - name: Upload validation errors as artifact
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: validationErrors
        path: validationErrors.md
