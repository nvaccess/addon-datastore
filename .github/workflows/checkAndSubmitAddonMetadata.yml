name: Check submitted NVDA add-on

on:
  workflow_call:
    inputs:
      issueNumber:
        required: true
        type: string
      issueAuthorId:
        required: true
        type: string
      issueAuthorName:
        required: true
        type: string
    secrets:
      VT_API_KEY:
        required: true
      VIEWS_PUSH_TOKEN:
        required: true

env:
  branchName: ${{ inputs.issueAuthorName }}${{ inputs.issueNumber }}
  jobFooter: "\n\n---\n\n[Related GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

jobs:
  getAddonId:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      addonFileName: ${{ steps.getAddonFileName.outputs.result }}
      addonId: ${{ steps.getAddonId.outputs.result }}
      addonIdParsed: ${{ steps.getAddonIdParsed.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.branchName }}
      - name: Determine add-on file name
        uses: actions/github-script@v9
        id: getAddonFileName
        env:
          issueAuthorName: ${{ inputs.issueAuthorName }}
          issueNumber: ${{ inputs.issueNumber }}
        with:
          result-encoding: string
          script: |
            const getAddonFilename = require('./.github/workflows/checkFilesChanged.js')
            const url = "GET /repos/" + process.env.GITHUB_REPOSITORY + "/compare/master..." + "${{ env.branchName }}"
            const result = await github.request(url)
            return getAddonFilename(result.data.files)
      - name: Handle error in get add-on file name
        if: ${{ failure() && steps.getAddonFileName.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f ./validationErrors.md ]; then
            echo "${{ env.jobFooter }}" >> ./validationErrors.md
            gh issue comment "${{ inputs.issueNumber }}" --body-file ./validationErrors.md
            gh issue close "${{ inputs.issueNumber }}" --reason "not planned"
          else
            echo "Submission validation failed unexpectedly. Please wait for a staff member to respond. This may take up to 2 weeks." >> message.txt
            echo "${{ env.jobFooter }}" >> message.txt
            gh issue comment "${{ inputs.issueNumber }}" --body-file ./message.txt
          fi
      - name: Determine add-on ID
        uses: actions/github-script@v9
        id: getAddonId
        with:
          result-encoding: string
          script: |
            const addonFileName = "${{ steps.getAddonFileName.outputs.result }}"
            const addonIdRegex = RegExp("addons/(.*)/.*\.json")
            return addonIdRegex.exec(addonFileName)[1]
      - name: Parse spaces and special characters from addonID for branch names
        uses: actions/github-script@v9
        id: getAddonIdParsed
        with:
          result-encoding: string
          script: |
            const addonId = "${{ steps.getAddonId.outputs.result }}"
            return addonId.replace(/[^a-zA-Z0-9]/g, "")
      - name: Upload add-on
        uses: actions/upload-artifact@v7
        with:
          name: addonMetadata
          path: ${{ steps.getAddonFileName.outputs.result }}

  verifySubmitter:
    # jq for windows has issues parsing multiline strings (e.g. CRLF),
    # use linux instead.
    runs-on: ubuntu-latest
    needs: [getAddonId]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Check if submitter is trusted to submit for this add-on or any add-on ID
        id: checkReg
        run: |
          jqCode="
          . | .[\"${{ inputs.issueAuthorId }}\"]
          | select(
            .trustedSubmitter
            or (
              .addons
              | index(\"${{ needs.getAddonId.outputs.addonId }}\")
            )
          )
          "

          jq -e "$jqCode" submitters.json
          # -e only sets the exit status of jq to 0 if there is "truthy" output.
          # If no valid result is produced, i.e. no submitter is found, jq exits with status 4.
          # If there is a different error, a different non-zero exit code is used.
          exit $? # Exit with the same exit code as jq
      - name: Post submitter registration message
        if: failure()
        run: |
            gh issue comment "${{ inputs.issueNumber }}" --body "${{ env.body }}"
        env:
          GH_TOKEN: ${{ github.token }}
          body: |
            Welcome to the Add-on Store submission process.
            As this is your first submission for ${{ needs.getAddonId.outputs.addonId }}, you will need manual approval as a submitter.
            If you are not the owner of the main repository for this add-on, please provide evidence that you have permission to submit this add-on.
            Please wait until an NV Access team member can review the submission.
            It may take up to 2 weeks for a team member to respond, depending on their availability.
            ${{ env.jobFooter }}

  createPullRequest:
    runs-on: ubuntu-latest
    needs: [getAddonId]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      pullRequestNumber: ${{ steps.cpr.outputs.pullRequestNumber }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ env.branchName }}
    - name: Create pull request
      id: cpr
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        prUrl=$(gh pr create --base master --head "${{ env.branchName }}" --title "Publish ${{ needs.getAddonId.outputs.addonFileName }}" --body "Closes #${{ inputs.issueNumber }}")
        prNumber="${prUrl%/}"
        prNumber="${prNumber##*/}"
        echo "pullRequestNumber=$prNumber" >> "$GITHUB_OUTPUT"
    - name: Create validation errors file
      run: echo "" > validationErrors.md
    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v8.2.0
    - name: Validate metadata
      run: |
        uv run --directory validation python -m _validate.validate "../${{ needs.getAddonId.outputs.addonFileName }}" ../transform/nvdaAPIVersions.json --output ../validationErrors.md
    - name: Post validation errors as comment
      if: failure()
      run: |
        echo "${{ env.jobFooter }}" >> ./validationErrors.md
        gh issue comment "${{ inputs.issueNumber }}" --body-file ./validationErrors.md
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Close pull request
      if: failure()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ -n "${{ steps.cpr.outputs.pullRequestNumber }}" ]; then
          gh pr close "${{ steps.cpr.outputs.pullRequestNumber }}"
          git push origin --delete ${{ env.branchName }}
        fi
    - name: Close issue
      if: failure()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue close "${{ inputs.issueNumber }}" --reason "not planned"

  virusTotal-analysis:
    needs: [getAddonId, createPullRequest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY || '' }}
      VT_API_LIMIT: ${{ vars.VT_API_LIMIT || '50' }}
    outputs:
      vtScanUrl: ${{ steps.setVirusTotalAnalysisStatus.outputs.vtScanUrl }}
      vtResultsJSON: ${{ steps.setVirusTotalAnalysisStatus.outputs.vtResults }}
      vtKeySet: ${{ env.VT_API_KEY != '' }}
    steps:
      # checkout of repo needed for posting comments to issues
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.branchName }}
      - name: Check if VT_API_KEY is set
        id: checkVTKey
        if: ${{ !env.VT_API_KEY }}
        run: |
          echo "VT_API_KEY secret is not set. Skipping VirusTotal analysis."
          exit 1
      - name: Install Node.js
        uses: actions/setup-node@v6
      - name: Install npm dependencies
        run: npm install uuid
      - name: Install virusTotal
        run: |
          curl -fsSL -o vt-cli.zip https://github.com/VirusTotal/vt-cli/releases/latest/download/Linux64.zip
          unzip -q vt-cli.zip
          chmod +x vt
          sudo mv vt /usr/local/bin/vt
      - name: Set Virus Total analysis status
        id: setVirusTotalAnalysisStatus
        uses: actions/github-script@v9
        with:
          script: |
            const setVirusTotalAnalysisStatus = require('./.github/workflows/virusTotalAnalysis.js')
            setVirusTotalAnalysisStatus({core}, ["${{ needs.getAddonId.outputs.addonFileName }}"])
      - name: Warn if VT not set up correctly
        if: ${{ failure() && steps.checkVTKey.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<'EOF' > vt-not-set-up-correctly.md
          VirusTotal is not configured for this repository.
          Please approve the add-on submission manually or configure an API key.
          ${{ env.jobFooter }}
          EOF
          gh issue comment "${{ inputs.issueNumber }}" --body-file vt-not-set-up-correctly.md
      - name: Warn if analysis fails
        if: ${{ failure() && steps.setVirusTotalAnalysisStatus.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<'EOF' > vt-analysis-failed.md
          VirusTotal has flagged this add-on as malicious.
          You can open this link and [see the results of the analysis](${{ steps.setVirusTotalAnalysisStatus.outputs.vtScanUrl }}).
          NV Access will review the results of the analysis and consider if it is likely a false positive or higher risk.
          It is encouraged to contact the flagged security vendors to get them to review and unflag the false positive.
          Please ask here or email <info@nvaccess.org> if you need assistance with this process.
          ${{ env.jobFooter }}
          EOF
          gh issue comment "${{ inputs.issueNumber }}" --body-file vt-analysis-failed.md

  commitScanResults:
    needs: [getAddonId, virusTotal-analysis]
    if: ${{ always() && needs.virusTotal-analysis.outputs.vtKeySet == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.branchName }}
      - name: Update branch
        run: |
          git pull --rebase origin ${{ env.branchName }}
      - name: Write vtResultsJSON to file to prevent line length syntax issues
        uses: actions/github-script@v9
        env:
          vtResultsJSON: ${{ needs.virusTotal-analysis.outputs.vtResultsJSON }}
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('vtResults.json', process.env.vtResultsJSON);
      - name: Collate analysis results into add-on metadata
        run: |
          jq --tab \
             --argjson vtResults "$(cat vtResults.json)" \
             --arg vtScanUrl '${{ needs.virusTotal-analysis.outputs.vtScanUrl }}' \
             '. + {
                vtScanUrl: $vtScanUrl,
                scanResults: {
                  "virusTotal": $vtResults
                }
              }' \
             ${{ needs.getAddonId.outputs.addonFileName }} > tmp.json
          mv tmp.json ${{ needs.getAddonId.outputs.addonFileName }}
      - name: Commit add-on metadata
        run: |
          git add ${{ needs.getAddonId.outputs.addonFileName }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Add code analysis results"
          git pull --rebase origin ${{ env.branchName }}
          git push --set-upstream origin ${{ env.branchName }}

  requireSecurityManualApproval:
    needs: [commitScanResults, virusTotal-analysis]
    if: ${{ always() && (needs.virusTotal-analysis.result == 'failure') }}
    runs-on: ubuntu-latest
    environment:
      # Require a manual deployment approval if security analysis fails
      name: securityReview
    steps:
      - name: Confirm approval
        run: echo "Manual approval performed"

  requireSubmitterManualApproval:
    needs: [verifySubmitter]
    if: ${{ always() && (needs.verifySubmitter.result == 'failure') }}
    runs-on: ubuntu-latest
    environment:
      # Require a manual deployment approval if manual approval is required for the submitter
      name: submitterReview
    steps:
      - name: Confirm approval
        run: echo "Manual approval performed"

  passesManualReview:
    needs: [requireSecurityManualApproval, requireSubmitterManualApproval, commitScanResults]
    if: ${{ always() && (needs.commitScanResults.result == 'success' || needs.commitScanResults.result == 'skipped') && (needs.requireSecurityManualApproval.result == 'success' || needs.requireSecurityManualApproval.result == 'skipped') && (needs.requireSubmitterManualApproval.result == 'success' || needs.requireSubmitterManualApproval.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm manual review passed
        run: echo "Passed manual review"

  failsManualReview:
    needs: [createPullRequest, requireSecurityManualApproval, requireSubmitterManualApproval]
    if: ${{ always() && (needs.requireSecurityManualApproval.result == 'failure' || needs.requireSubmitterManualApproval.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Fetch Rejection Comment
        env:
          GH_TOKEN: ${{ github.token }}
        id: fetchRejectionComment
        run: |
          approvalsJson="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals" \
            2>/dev/null || true)"

          rejectionReasons="$(
            printf '%s' "$approvalsJson" | jq -r '
              [ .[]? | select(.state == "rejected") | "- " + (.comment // "No reason provided.") ]
              | if length == 0 then "- No reason provided." else join("\n") end
            '
          )"

          reviewers="$(
            printf '%s' "$approvalsJson" | jq -r '
              [ .[]? | select(.state == "rejected") | .user.login ]
              | unique
              | if length == 0 then "Unknown reviewer" else join(", ") end
            '
          )"

          {
            echo 'rejectionReasons<<EOF'
            echo "$rejectionReasons"
            echo 'EOF'
            echo "reviewers=$reviewers"
          } >> "$GITHUB_OUTPUT"

      - name: Post manual review failure comment and close PR and issue
        run: |
          gh issue comment "${{ inputs.issueNumber }}" --body "${{ env.body }}"
          gh pr close "${{ needs.createPullRequest.outputs.pullRequestNumber }}"
          gh branch delete ${{ env.branchName }} --remote --force
          gh issue close "${{ inputs.issueNumber }}" --reason "not planned"
        env:
          GH_TOKEN: ${{ github.token }}
          body: |
            The submission did not pass the manual review process.
            Reason for the rejection:

            ${{ steps.fetchRejectionComment.outputs.rejectionReasons }}

            Reviewers: ${{ steps.fetchRejectionComment.outputs.reviewers }}
            ${{ env.jobFooter }}

  pushFurtherChangesAndMerge:
    concurrency:
      # When modifying submitters.json or discussions.json,
      # we want to avoid merge conflicts by ensuring only one workflow can push changes at a time.
      group: avoidMergeConflicts
      queue: max
    # jq for windows has issues parsing multiline strings (e.g. CRLF),
    # use linux instead.
    runs-on: ubuntu-latest
    if: ${{ always() && needs.passesManualReview.result == 'success' && needs.getAddonId.result == 'success' && needs.createPullRequest.result == 'success' }}
    needs: [getAddonId, passesManualReview, createPullRequest, requireSubmitterManualApproval, virusTotal-analysis]
    permissions:
      contents: write
      discussions: write
      pull-requests: write
      issues: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ env.branchName }}
        # Get deeper history to ensure merge with master can happen
        fetch-depth: 0
    - name: Update branch to avoid conflicts
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git pull --rebase origin ${{ env.branchName }}
        git fetch origin master
        git merge origin/master --no-edit
    - name: Get add-on name and version
      id: getAddonNameAndVersion
      uses: actions/github-script@v9
      with:
        script: |
          const setAddonNameAndVersion = require('./.github/workflows/getAddonNameAndVersion.js')
          const addonFilename = "${{ needs.getAddonId.outputs.addonFileName }}"
          setAddonNameAndVersion({core}, addonFilename)
    - name: Add add-on ID and submitter to JSON file
      if: ${{ needs.requireSubmitterManualApproval.result == 'success' }}
      run: |
        jqCode="
        .[\"${{ inputs.issueAuthorId }}\"].addons += [\"${{ needs.getAddonId.outputs.addonId }}\"]
        | .[\"${{ inputs.issueAuthorId }}\"].githubName = \"${{ inputs.issueAuthorName }}\"
        "

        mv submitters.json submitters.old.json
        jq -e --tab "$jqCode" submitters.old.json > submitters.json
        jqExitCode=$?
        rm submitters.old.json
        exit $jqExitCode
    - name: Commit submitters.json changes
      if: ${{ needs.requireSubmitterManualApproval.result == 'success' }}
      run: |
        git add submitters.json
        git commit -m "Add ${{ inputs.issueAuthorName }} as an approved submitter for ${{ needs.getAddonId.outputs.addonId }}"
        git push --set-upstream origin ${{ env.branchName }}
    - name: Check if discussion for this add-on exists
      id: checkDiscussion
      run: |
        jqStatus=$(jq 'has("${{ needs.getAddonId.outputs.addonId }}")' discussions.json)
        echo "jqStatus=$jqStatus" >> "$GITHUB_OUTPUT"
        echo "$jqStatus"
    - name: Create discussion for add-on id
      id: createDiscussion
      if: ${{ ! fromJSON(steps.checkDiscussion.outputs.jqStatus) }}
      uses: nvdaes/build-discussion@v2
      with:
        category-position: 1
        title: Reviews for ${{ steps.getAddonNameAndVersion.outputs.addonName }} (${{ needs.getAddonId.outputs.addonId }})
        body: |
          Community add-on reviews for ${{ steps.getAddonNameAndVersion.outputs.addonName }}.
          Please use threaded replies and avoid email responses.
          You can specify the add-on version and other info that you consider relevant in your comment.
          Reviews should abide by the [NVDA code of conduct](https://github.com/nvaccess/nvda/blob/master/CODE_OF_CONDUCT.md).
    - name: Add add-on ID and discussion data to json file
      if: ${{ ! fromJSON(steps.checkDiscussion.outputs.jqStatus) }}
      run: |
        addonId=$(
          echo ${{ needs.getAddonId.outputs.addonId }}
         )
        discussionId=$(
          echo ${{ steps.createDiscussion.outputs.discussion-id }}
        )
        discussionUrl=$(
          echo ${{ steps.createDiscussion.outputs.discussion-url }}
        )
        jqCode="
        .[\"$addonId\"].discussionId = \"$discussionId\"
        | .[\"$addonId\"].discussionUrl = \"$discussionUrl\"
        "

        mv discussions.json discussions.old.json
        jq -e --tab "$jqCode" discussions.old.json > discussions.json
        jqExitCode=$?
        rm discussions.old.json
        exit $jqExitCode
    - name: Add discussion URL to metadata
      run: |
        addonFilename=$(
          echo "${{ needs.getAddonId.outputs.addonFileName }}"
        )
        addonId=$(
          echo ${{ needs.getAddonId.outputs.addonId }}
        )
        reviewUrl=$(
          jq --tab ".\"$addonId\".discussionUrl" discussions.json
        )
        jqReviewCode="
        .[\"reviewUrl\"] = $reviewUrl
        "

        mv $addonFilename $addonFilename.old.json
        jq -e --tab "$jqReviewCode" $addonFilename.old.json > $addonFilename
        jqReviewExitCode=$?
        rm $addonFilename.old.json
        exit $jqReviewExitCode
    - name: Commit and push
      run: |
        git add .
        if git diff --staged --quiet; then
          echo "No staged changes; skipping commit and push."
        else
          git commit -m "update discussion URL"
          git pull --rebase origin ${{ env.branchName }}
          git push --set-upstream origin ${{ env.branchName }}
        fi
    - name: Merge branch to master
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git fetch origin master
        git merge origin/master --no-edit
        git push --set-upstream origin ${{ env.branchName }}
        # wait for a few seconds to ensure the PR is up to date before merging
        sleep 3
        gh pr merge --admin --squash ${{ env.branchName }} -b '[Automated] Merged ${{ needs.getAddonId.outputs.addonFileName }} into master (PR #${{ needs.createPullRequest.outputs.pullRequestNumber }})'
    - name: Comment on issue confirming successful submission
      env:
        GH_TOKEN: ${{ github.token }}
        body: |
          The add-on submission has passed validation and has been accepted.
          It should be available in the Add-on Store in the next few hours.
          Thank you for your contribution!
          ${{ env.jobFooter }}
      run: |
        gh issue comment "${{ inputs.issueNumber }}" --body "${{ env.body }}"

  call-workflow:
    needs: [pushFurtherChangesAndMerge]
    permissions:
      contents: write
      pull-requests: write
    if: ${{ always() && needs.pushFurtherChangesAndMerge.result == 'success' }}
    uses: ./.github/workflows/transformDataToViews.yml
    secrets:
      VIEWS_PUSH_TOKEN: ${{ secrets.VIEWS_PUSH_TOKEN }}
